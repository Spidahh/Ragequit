<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RageQuit: Arena Modulare</title>
        <link rel="stylesheet" href="./css/styles.css">

</head>
<body>
    <div id="screen-flash"></div>
    <div id="floating-text-container"></div>
    <div id="connection-status">DISCONNESSO</div>
    
    <!-- Kill Counter -->
    <div id="kill-counter-container">
        <div id="kill-counter-team" style="display:flex;flex-wrap:wrap;gap:10px"></div>
    </div>

    <div class="top-controls">
        <button id="reset-btn" class="btn">RESPAWN</button>
        <button id="keybinds-btn" class="btn">COMANDI</button>
        <button id="audio-btn" class="btn">AUDIO: OFF</button>
        <button id="menu-btn" class="btn" style="border-bottom: 2px solid #e91e63;">MENU</button>
    </div>

    <div id="crosshair"></div>
    <div id="cast-bar-container"><div id="cast-text">CARICAMENTO...</div><div id="cast-bar-fill"></div></div>
    
    <div id="action-bar">
        <div id="slot-q" class="action-slot slot-q"><div class="key-label" id="lbl-switch">Q</div><div class="spell-icon">⚔️</div><div class="cooldown-overlay" id="whirlwind-cd"></div></div>
        <div id="slot-e" class="action-slot slot-e"><div class="key-label" id="lbl-bow">E</div><div class="spell-icon">🏹</div><div class="cooldown-overlay"></div></div>
        <div id="slot-1" class="action-slot slot-1 active"><div class="key-label" id="lbl-spell1">1</div><div class="spell-icon">🔹</div><div class="cooldown-overlay"></div></div>
        <div id="slot-2" class="action-slot slot-2"><div class="key-label" id="lbl-spell2">2</div><div class="spell-icon">💨</div><div class="cooldown-overlay"></div></div>
        <div id="slot-3" class="action-slot slot-3"><div class="key-label" id="lbl-spell3">3</div><div class="spell-icon">🔥</div><div class="cooldown-overlay"></div></div>
        <div id="slot-4" class="action-slot slot-4"><div class="key-label" id="lbl-spell4">4</div><div class="spell-icon">⛰️</div><div class="cooldown-overlay" id="spikes-cd"></div></div>
        <div id="slot-r" class="action-slot slot-r"><div class="key-label" id="lbl-heal">R</div><div class="spell-icon">💚</div><div class="cooldown-overlay" id="heal-cd"></div></div>
        <div class="separator"></div>
        <div id="slot-5" class="action-slot" onclick="window.performConversion(1)"><div class="key-label" id="lbl-conv1">5</div><div class="spell-icon"><span class="conv-icon plus-red">+♥</span><span class="conv-icon minus-yellow">-⚡</span></div><div class="cooldown-overlay" id="conv1-cd"></div></div>
        <div id="slot-6" class="action-slot" onclick="window.performConversion(2)"><div class="key-label" id="lbl-conv2">6</div><div class="spell-icon"><span class="conv-icon plus-blue">+💧</span><span class="conv-icon minus-red">-♥</span></div><div class="cooldown-overlay" id="conv2-cd"></div></div>
        <div id="slot-7" class="action-slot" onclick="window.performConversion(3)"><div class="key-label" id="lbl-conv3">7</div><div class="spell-icon"><span class="conv-icon plus-yellow">+⚡</span><span class="conv-icon minus-blue">-💧</span></div><div class="cooldown-overlay" id="conv3-cd"></div></div>
    </div>

    <div id="ui-container">
        <div class="bar-container"><div id="hp-bar" class="bar"></div><span class="label">SALUTE</span></div>
        <div class="bar-container"><div id="mana-bar" class="bar"></div><span class="label">MANA</span></div>
        <div class="bar-container"><div id="stamina-bar" class="bar"></div><span class="label" style="color:#ffffaa">STAMINA</span></div>
        <div style="margin-top:5px; font-size:12px; color:#aaa; display:flex; justify-content:space-between;">
            <span id="weapon-mode-text" style="color:cyan">RANGED</span>
            <span id="block-text" style="color:#ffd700; display:none;">🛡️ PARATA</span>
        </div>
    </div>
    
    <!-- CHAT MOVIBILE -->
    <div id="chat-container">
        <div id="chat-header">💬 CHAT <button id="chat-close-btn" style="float:right;background:transparent;border:none;color:#ff0000;font-weight:900;cursor:pointer;font-size:16px;">×</button></div>
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Premi INVIO per chattare..." maxlength="100">
        </div>
    </div>

    <div id="message"></div>
    <div id="log"></div>

    <!-- MAIN MENU -->
    <div id="main-menu">
        <div class="menu-content">
            <img id="game-logo" src="./IMG/logo.png" alt="RageQuit" class="logo">
            
            <div class="mode-buttons">
                <button id="team-btn" class="mode-btn team-btn">
                    <div class="mode-icon">🛡️</div>
                    <div class="mode-name">SQUADRE</div>
                    <div class="mode-desc">4 Team in battaglia</div>
                </button>
            </div>
            
            <div class="extra-buttons">
                <button id="menu-keybinds-btn" class="extra-btn">⌨️ COMANDI</button>
                <button id="menu-audio-btn" class="extra-btn">🔊 AUDIO</button>
            </div>
            
            <div class="username-input">
                <input type="text" id="username-input" placeholder="NOME GUERRIERO" maxlength="12">
            </div>
            
            <h1 class="game-title">RAGE<span style="color:#ff0000">QUIT</span></h1>
        </div>
    </div>

    <!-- TEAM SELECTION -->
    <div id="team-selection-screen" style="display:none;">
        <div class="team-grid">
            <div class="team-option" data-team="red">
                <div class="team-bg red-bg"></div>
                <h2>ROSIKONI</h2>
                <div class="team-icon">🔴</div>
                <div class="team-player-count" id="team-count-red">0 giocatori</div>
            </div>
            <div class="team-option" data-team="black">
                <div class="team-bg black-bg"></div>
                <h2>TRIMONI</h2>
                <div class="team-icon">⚫</div>
                <div class="team-player-count" id="team-count-black">0 giocatori</div>
            </div>
            <div class="team-option" data-team="green">
                <div class="team-bg green-bg"></div>
                <h2>FATTONI</h2>
                <div class="team-icon">🟢</div>
                <div class="team-player-count" id="team-count-green">0 giocatori</div>
            </div>
            <div class="team-option" data-team="purple">
                <div class="team-bg purple-bg"></div>
                <h2>SQUAGLIATI</h2>
                <div class="team-icon">🟣</div>
                <div class="team-player-count" id="team-count-purple">0 giocatori</div>
            </div>
        </div>
    </div>

    <div id="keybinds-panel">
        <h2>⌨️ CONFIGURAZIONE TASTI</h2>
        <div id="keybinds-content"></div>
        <button id="close-keybinds">CHIUDI</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script src="./js/menu.js"></script>
    <script src="./js/spells.js"></script>
    <script src="./js/world.js"></script>
    <script src="./js/player.js"></script>
    <script src="./js/ai.js"></script>
    <script src="./js/network.js"></script>
    <script src="./js/game.js"></script>

</body>
</html>
